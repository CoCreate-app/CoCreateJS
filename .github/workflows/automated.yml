name: Automated

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Allowed to push tags, commits, and update CHANGELOG.md
      issues: write         # Allowed to comment on issues resolved in the release
      pull-requests: write  # Allowed to comment on PRs resolved in the release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: tells Git to fetch all history so semantic-release can parse commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic
        with:
          # This tells the action to install these modules so they match your release.config.js
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" # Use the built-in token if possible
          NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
    outputs:
      new_release_published: "${{ steps.semantic.outputs.new_release_published }}"
      new_release_version: "${{ steps.semantic.outputs.new_release_version }}"